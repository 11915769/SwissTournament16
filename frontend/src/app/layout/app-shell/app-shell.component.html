<div style="max-width: 1100px; margin: 24px auto; padding: 16px; font-family: system-ui;">
  <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
    <h1 style="margin:0;">Kniffel Swiss 16</h1>

    <div style="display:flex; gap:12px; align-items:center;">
      <span style="font-size:14px;">
        {{ getUsername(auth.getEmail()) }}
        <b *ngIf="admin.isAdmin()"> (admin)</b>
      </span>
      <button (click)="logout()">Logout</button>
    </div>
  </div>

  <nav style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
  <!-- Before joining: only show Join -->
  <a *ngIf="!joined" routerLink="/join" routerLinkActive="activeTab" class="tab">Join</a>

  <!-- After joining: show the rest -->
  <ng-container *ngIf="joined">
    <a routerLink="/standings" routerLinkActive="activeTab" class="tab">Standings</a>
    <a routerLink="/bracket" routerLinkActive="activeTab" class="tab">Bracket</a>
    <a routerLink="/rules" routerLinkActive="activeTab" class="tab">Rules</a>
    <a routerLink="/matches" routerLinkActive="activeTab" class="tab">Matches</a>
  </ng-container>

  <!-- Admin tab: up to you if you want it only after joining -->
  <a *ngIf="admin.isAdmin()" routerLink="/admin" routerLinkActive="activeTab" class="tab">Admin</a>
</nav>

  <div style="margin-top:16px;">
    <router-outlet></router-outlet>
  </div>
</div>

<style>
  .tab {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 999px;
    text-decoration: none;
    color: inherit;
    font-size: 14px;
  }
  .activeTab {
    border-color: #000;
    font-weight: 600;
  }
</style>

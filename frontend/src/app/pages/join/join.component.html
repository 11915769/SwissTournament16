<div class="container fade-in">
  <div class="hero">
    <div>
      <h1 class="h-title">Join the Tournament</h1>
    </div>
  </div>

  <div class="notice" *ngIf="checking">Checking tournament status…</div>

  <div class="card card-pad" style="max-width: 580px;" *ngIf="!checking">
    <label class="h-sub" style="display:block; margin-bottom:8px;">Username</label>
    <div class="form-stack">
      <input
        class="input"
        [(ngModel)]="name"
        maxlength="24"
        placeholder="e.g. David"
      />

      <div class="notice" *ngIf="loading">Joining…</div>
      <div class="err" *ngIf="error">{{ error }}</div>

      <div style="display:flex; gap:10px; margin-top: 14px;">
        <button class="btn" (click)="join()" [disabled]="loading || !name.trim()">
          Join Tournament
        </button>
      </div>
    </div>

    <div class="notice" style="margin-top: 12px;">
      Tipp: Coolere Namen sind cooler.
    </div>
  </div>
</div>
